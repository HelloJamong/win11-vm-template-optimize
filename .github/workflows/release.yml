name: Release

# 태그 푸시(예: git tag 26.1.8 && git push origin 26.1.8) 또는 수동 실행으로 트리거됩니다.
on:
  push:
    tags:
      - '[0-9][0-9].[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: '릴리즈 버전 (예: 26.1.8) — 해당 태그가 저장소에 이미 존재해야 합니다'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # 릴리즈 노트를 셸 변수에 저장하지 않고 파일에 직접 씁니다.
          # 변수 확장 시 CHANGELOG 내 마크다운 백틱이 bash 명령으로 해석되는 문제를 방지합니다.
          NOTES_FILE="$(mktemp)"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > "${NOTES_FILE}"

          if [ ! -s "${NOTES_FILE}" ]; then
            echo "::warning::CHANGELOG.md에서 버전 [${VERSION}] 항목을 찾을 수 없습니다."
            printf 'CHANGELOG.md의 [%s] 항목을 찾을 수 없습니다.\n' "${VERSION}" > "${NOTES_FILE}"
          fi

          # 파일 경로를 output으로 전달합니다 (이후 단계에서 cat으로 읽어 bash 해석을 우회).
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

          # GitHub Release body용 멀티라인 output (Actions 표현식 레벨에서 처리됨).
          {
            printf 'notes<<CHANGELOG_EOF\n'
            cat "${NOTES_FILE}"
            printf '\nCHANGELOG_EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Create release ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p _release/_iso
          mkdir -p _release/sysprep
          mkdir -p _release/docs
          mkdir -p _release/configs

          # Audit Mode 최적화 스크립트
          cp scripts/win11_master_template_optimize.ps1 _release/

          # VM_optimize ISO 생성 도구 (sdelete 등 추가 파일 번들용)
          cp scripts/build-vm-optimize-iso.ps1          _release/

          # 커스텀 목록 파일 (Appx/서비스/예약작업 후보)
          cp configs/appx-remove-list.txt               _release/configs/
          cp configs/services-disable-list.txt          _release/configs/
          cp configs/tasks-disable-list.txt             _release/configs/

          # Sysprep 관련 파일 일체
          cp scripts/sysprep/unattend.xml               _release/sysprep/
          cp scripts/sysprep/first_logon.ps1            _release/sysprep/
          cp scripts/sysprep/setupcomplete.cmd          _release/sysprep/
          cp scripts/sysprep/build-unattend-iso.ps1     _release/sysprep/

          # 통합 가이드
          cp docs/guide.md                              _release/docs/

          # Version.txt: cat으로 파일을 읽어 bash 백틱 해석을 우회합니다.
          {
            printf 'Version: %s\n\n' "${VERSION}"
            cat "${{ steps.changelog.outputs.notes_file }}"
          } > _release/Version.txt
          cd _release && zip -r ../VM-Optimize.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: VM-Optimize.zip
